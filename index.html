<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#D4AF37">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Infiniversal">
  <meta name="description" content="Composición de poesía y letras de canciones con análisis emocional, técnico y estructural.">

  <title>Infiniversal</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow-x: hidden; }
    #root { min-height: 100vh; }
    #splash {
      position: fixed; inset: 0; z-index: 99999;
      background: #0a0a0a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Montserrat', sans-serif;
      transition: opacity 0.4s ease;
    }
    #splash img { width: 80px; height: 80px; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
    #splash span { color: #D4AF37; font-size: 14px; font-weight: 300; letter-spacing: 3px; }
    @keyframes pulse { 0%,100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
</head>
<body>
  <div id="splash">
    <img src="icons/icon-192x192.png" alt="Infiniversal">
    <span>INFINIVERSAL</span>
  </div>
  <div id="root"></div>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // Load and render the app
    (async () => {
      try {
        const res = await fetch('app.jsx');
        let code = await res.text();

        // Strip ES module import/export (the app uses React globals)
        code = code.replace(/^import\s+\{[^}]+\}\s+from\s+["']react["'];?\s*$/m, '');
        code = code.replace(/^export\s+default\s+/m, '');

        // Make React hooks available as globals
        const { useState, useEffect, useRef, useCallback, useMemo, Fragment, createElement } = React;
        window.useState = useState;
        window.useEffect = useEffect;
        window.useRef = useRef;
        window.useCallback = useCallback;
        window.useMemo = useMemo;
        window.Fragment = Fragment;

        // Transpile JSX with Babel
        const transformed = Babel.transform(code, {
          presets: ['react'],
          filename: 'app.jsx'
        }).code;

        // Evaluate and render
        const AppFactory = new Function(
          'React', 'useState', 'useEffect', 'useRef', 'useCallback', 'useMemo', 'Fragment',
          transformed + '\nreturn Infiniversal;'
        );
        const App = AppFactory(React, useState, useEffect, useRef, useCallback, useMemo, Fragment);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));

        // Hide splash
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 400);
          }
        }, 300);
      } catch (err) {
        console.error('App load error:', err);
        document.getElementById('splash').innerHTML =
          '<span style="color:#ff6b6b;font-size:12px;padding:20px;text-align:center">Error cargando la app.<br>Revisa la consola (F12).</span>';
      }
    })();
  </script>
</body>
</html>
